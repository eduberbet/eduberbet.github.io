<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMI Rocket | Cockpit v4.3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body class="mode-orbital"> <div id="cockpit-container">
        
        <div id="deep-space">
            <div id="star-samuel" class="interactive-lore" data-target="105"></div>
            <div class="star-field"></div>
        </div>

        <main id="hud-glass">
            <header id="hud-header">
                <div class="telemetry">
                    <span>SISTEMA: ROCKET v4.3</span>
                    <span id="lumi-status">STATUS: EM ÓRBITA</span>
                </div>
                <div class="core-lantern" id="lantern-indicator"></div>
            </header>

            <section id="chat-output">
                </section>

            <footer id="hud-input-area">
                <input type="text" id="user-input" placeholder="Comando de navegação..." autocomplete="off">
                <button id="btn-ignition">IGNIÇÃO</button>
            </footer>
        </main>

        <nav id="dashboard">
            <div id="isaque-seal" class="interactive-lore" data-target="106">
                Visual Art by Isaque Berbet
            </div>

            <div id="manche-control">
                <label for="flight-stick">MODO DE VOO</label>
                <div class="stick-wrapper">
                    <input type="range" min="0" max="2" value="1" id="flight-stick" step="1">
                    <div class="stick-labels">
                        <span>SONDA</span>
                        <span>ORBITAL</span>
                        <span>HIPER</span>
                    </div>
                </div>
            </div>

            <div id="fuselage-badges">
                <span class="badge mission-passed" title="v4.1 - Girafa Mergulhadora">🦒</span>
                <span class="badge mission-passed" title="v4.2 - Pinguim Astronauta">🐧</span>
                <span class="badge current-mission" title="v4.3 - Polvo Filósofo">🐙</span>
            </div>
        </nav>

    </div>

    <script src="cerebro.js"></script>
    <script src="script.js"></script>
</body>
</html>
