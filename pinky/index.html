<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMI - Pinky Gold 5.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="lumi-header">
            <div id="lumi-focus" class="lumi-off"></div>
            <p id="lumi-status">Sintonizando...</p>
        </header>
        
        <main id="chat-container">
            <div id="messages"></div>
        </main>

        <footer class="input-area">
            <input type="text" id="user-input" placeholder="Pergunte à Lumi..." autocomplete="off">
            
            <div class="botoes-acao" id="group-normal">
                <button id="stt-btn" title="Segure para falar">🎙️</button>
                <button id="send-btn" title="Enviar texto">🚀</button>
            </div>

            <div class="botoes-acao" id="group-speed" style="display: none;">
                <button id="slow-btn" title="Mais lento">🐢</button>
                <button id="fast-btn" title="Mais rápido">⚡</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
